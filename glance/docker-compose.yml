services:
  glance:
    container_name: glance
    image: glanceapp/glance:latest
    restart: unless-stopped
    volumes:
    - ./config:/app/config
    - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
    - ${GLANCE_PORT:-8088}:8080
    networks:
    - pwn20wnd-network
    - default
    environment:
    - TZ=Asia/Kuala_Lumpur
networks:
  pwn20wnd-network:
    external: true
