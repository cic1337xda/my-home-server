services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
    - 3010:3000
    volumes:
    - ${DATA_DIR}/grafana:/var/lib/grafana
    env_file:
    - .env
    environment:
    - TZ=${TZ:-Asia/Kuala_Lumpur}
    - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
    - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
    - TZ=Asia/Kuala_Lumpur
    user: 472:472
    depends_on:
    - prometheus
    - mariadb
    networks:
    - pwn20wnd-network
    - default
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
    - 9090:9090
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    - ${DATA_DIR}/prometheus:/prometheus
    command:
    - --config.file=/etc/prometheus/prometheus.yml
    - --storage.tsdb.path=/prometheus
    - --storage.tsdb.retention.time=15d
    networks:
    - pwn20wnd-network
    - default
    environment:
    - TZ=Asia/Kuala_Lumpur
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
    - 9100:9100
    volumes:
    - /proc:/host/proc:ro
    - /sys:/host/sys:ro
    - /:/rootfs:ro
    command:
    - --path.procfs=/host/proc
    - --path.sysfs=/host/sys
    - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    networks:
    - pwn20wnd-network
    - default
    environment:
    - TZ=Asia/Kuala_Lumpur
  mariadb:
    image: mariadb:latest
    container_name: mariadb_iot
    restart: unless-stopped
    ports:
    - 3307:3306
    env_file:
    - .env
    environment:
    - TZ=${TZ:-Asia/Kuala_Lumpur}
    - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    - MYSQL_USER=${MYSQL_USER}
    - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    - TZ=Asia/Kuala_Lumpur
    volumes:
    - ${DATA_DIR}/mariadb_iot:/var/lib/mysql
    networks:
    - pwn20wnd-network
    - default
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin_iot
    restart: unless-stopped
    ports:
    - 8098:80
    environment:
    - TZ=${TZ:-Asia/Kuala_Lumpur}
    - PMA_HOST=mariadb
    - PMA_PORT=3306
    - TZ=Asia/Kuala_Lumpur
    depends_on:
    - mariadb
    networks:
    - pwn20wnd-network
    - default
  webserver:
    build: .
    container_name: php_backend
    restart: unless-stopped
    ports:
    - 8097:80
    volumes:
    - ./www:/var/www/html
    environment:
    - TZ=${TZ:-Asia/Kuala_Lumpur}
    - TZ=Asia/Kuala_Lumpur
    depends_on:
    - mariadb
    networks:
    - pwn20wnd-network
    - default
networks:
  pwn20wnd-network:
    external: true
